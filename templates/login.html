<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>「老」斯密碼 - 登入系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background: #e6f3ff; font-family: 'Microsoft JhengHei', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; border-top: 10px solid #1b3622; }
        .btn-teal { background-color: #1abc9c; color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; }
        .btn-teal:hover { background-color: #16a085; color: white; }
    </style>
</head>
<body>
<div class="login-box">
    <h2 class="fw-bold mb-2" style="color: #1b3622;">🔑 「老」斯密碼</h2>
    <p class="text-muted mb-4">老師語言翻譯系統 · 請登入開始解密</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3 text-start">
            <label class="form-label fw-bold">輸入您的帳號 (User ID)：</label>
            <input type="text" name="username" class="form-control" placeholder="請輸入您的帳號名稱" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label fw-bold">輸入您的密碼 (Password)：</label>
            <input type="password" name="password" class="form-control" placeholder="請輸入密碼" required>
        </div>
        <button type="submit" class="btn btn-teal shadow-sm">安全登入系統</button>
    </form>
    
    <div class="mt-4 pt-3 border-top text-muted small">
        還沒有帳號嗎？ <a href="{{ url_for('register') }}" class="text-success fw-bold text-decoration-none">點我立即創建帳號 ➔</a>
    </div>
</div>
</body>
</html>
