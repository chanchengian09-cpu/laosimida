<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老斯密碼 - 主選單</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: {{ bg_color }}; min-height: 100vh; display: flex; align-items: center; }
        .menu-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; }
    </style>
</head>
<body>
<div class="container" style="max-width: 600px;">
    <div class="menu-card text-center">
        <h1 class="text-primary fw-bold mb-2">🔑 老斯密碼 🔑</h1>
        <p class="text-muted">歡迎回來，<span class="badge bg-secondary">{{ current_user }}</span></p>
        
        <div class="row g-2 my-4">
            <div class="col-6">
                <div class="p-2 border rounded bg-light">
                    <small class="text-muted d-block">個人翻譯次數</small>
                    <strong class="fs-5 text-dark">{{ personal_count }}</strong>
                </div>
            </div>
            <div class="col-6">
                <div class="p-2 border rounded bg-light">
                    <small class="text-muted d-block">全服總翻譯量</small>
                    <strong class="fs-5 text-dark">{{ total_count }}</strong>
                </div>
            </div>
        </div>

        <hr>

        <div class="d-grid gap-3 my-4">
            <a href="{{ url_for('translate', mode='teacher_to_subtext') }}" class="btn btn-primary btn-lg">🗣️ 老師的話 ➔ 潛台詞</a>
            <a href="{{ url_for('translate', mode='subtext_to_teacher') }}" class="btn btn-outline-primary btn-lg">💭 潛台詞 ➔ 老師的話</a>
            
            <a href="{{ url_for('golden_sentence') }}" class="btn btn-warning btn-lg fw-bold text-dark">✨ 老斯密碼金句模擬器 (延長下課救星) ✨</a>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('badges') }}" class="btn btn-sm btn-info text-white">🏅 我的徽章</a>
            <a href="{{ url_for('add_idea') }}" class="btn btn-sm btn-success">💡 投稿新靈感</a>
            {% if is_admin %}
                <a href="{{ url_for('admin_panel') }}" class="btn btn-sm btn-danger">🛠️ 管理後台</a>
            {% endif %}
        </div>

        <div class="mt-4">
            <a href="{{ url_for('logout') }}" class="btn btn-sm btn-link text-muted">登出系統</a>
        </div>
    </div>
</div>
</body>
</html>
